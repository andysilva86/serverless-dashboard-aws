AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap for GitHub Actions ↔ AWS OIDC trust. Creates the OIDC
  identity provider for token.actions.githubusercontent.com (skipped if it
  already exists in the account) and an IAM role that the
  ``.github/workflows/deploy.yml`` workflow assumes via short-lived
  credentials — no long-lived AWS access keys are stored in GitHub.

  Deploy with:
    aws cloudformation deploy \
      --stack-name serverless-dashboard-github-oidc \
      --template-file bootstrap/github-oidc.yml \
      --capabilities CAPABILITY_NAMED_IAM \
      --parameter-overrides \
        GitHubOrg=YOUR_GITHUB_USERNAME_OR_ORG \
        RepoName=serverless-dashboard-aws

  After the stack is created, copy the ``DeployRoleArn`` output and add it
  to the repository's GitHub Actions secrets as ``AWS_DEPLOY_ROLE_ARN``.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub user or organisation that owns the repo (e.g. andysilva86).

  RepoName:
    Type: String
    Description: GitHub repository name (e.g. serverless-dashboard-aws).

  DeployBranch:
    Type: String
    Default: prod
    Description: Only pushes (or workflow_dispatch runs) on this branch may
      assume the deploy role. Wildcards like "prod*" are accepted by the
      ``StringLike`` condition.

  RoleName:
    Type: String
    Default: serverless-dashboard-github-deploy
    Description: Name of the IAM role the workflow will assume.

  CreateOIDCProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Set to "false" if your account already has the GitHub OIDC
      provider — IAM only allows one provider per URL per account, so a
      second template attempting to create it will fail with
      "EntityAlreadyExists".

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # Modern AWS no longer requires the thumbprint to match a real cert
      # (https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_providers_oidc_verify-thumbprint.html),
      # but the field is still required by the resource type. The values
      # below are the historically published GitHub OIDC thumbprints.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Assumed by the deploy.yml GitHub Actions workflow on push
        to the configured deploy branch in the configured repo.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  !Sub "repo:${GitHubOrg}/${RepoName}:ref:refs/heads/${DeployBranch}"
      ManagedPolicyArns:
        # Serverless Framework needs broad rights to manage the
        # CloudFormation stack it creates: Lambda, API Gateway, IAM roles,
        # S3, CloudFront, Cognito, DynamoDB, EventBridge, CloudWatch logs.
        # Default to AWS-managed policies for those services. Tighten for
        # higher-security accounts.
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AmazonAPIGatewayAdministrator
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
        - arn:aws:iam::aws:policy/AmazonCognitoPowerUser
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
        - arn:aws:iam::aws:policy/AmazonEventBridgeFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: ManageServerlessExecutionRoles
          PolicyDocument:
            # Serverless Framework creates per-service execution roles
            # (named ``<service>-<stage>-<region>-lambdaRole``) and passes
            # them to Lambda. The deploy role needs scoped IAM rights to
            # do that without granting blanket ``iam:*``.
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/serverless-dashboard-*"

Outputs:
  DeployRoleArn:
    Description: Add this ARN to the GitHub repo as the AWS_DEPLOY_ROLE_ARN secret.
    Value: !GetAtt GitHubDeployRole.Arn
  RoleName:
    Value: !Ref RoleName
  DeployBranch:
    Value: !Ref DeployBranch
