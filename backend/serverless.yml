service: serverless-dashboard

frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: python3.12
  region: ${opt:region, "us-east-1"}
  stage: ${opt:stage, "dev"}
  architecture: arm64
  memorySize: 512
  timeout: 10
  logRetentionInDays: 14
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-API-Key
      allowedMethods:
        - GET
        - POST
        - OPTIONS
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl:
          Fn::Join:
            - ""
            - - "https://cognito-idp."
              - ${self:provider.region}
              - ".amazonaws.com/"
              - Ref: UserPool
        audience:
          - Ref: UserPoolClient
  environment:
    TABLE_NAME: ${self:custom.tableName}
    USER_POOL_ID: !Ref UserPool
    USER_POOL_CLIENT_ID: !Ref UserPoolClient
    EVENT_BUS_NAME: ${self:custom.eventBusName}
    WEBHOOK_API_KEY: ${env:WEBHOOK_API_KEY, "change-me-in-prod"}
    LOG_LEVEL: INFO
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt AppTable.Arn
            - !Sub "${AppTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - cognito-idp:SignUp
            - cognito-idp:InitiateAuth
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminConfirmSignUp
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:ConfirmSignUp
            - cognito-idp:ResendConfirmationCode
            - cognito-idp:ForgotPassword
            - cognito-idp:ConfirmForgotPassword
          Resource: !GetAtt UserPool.Arn
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource: !GetAtt AppEventBus.Arn

custom:
  tableName: ${self:service}-${self:provider.stage}
  eventBusName: ${self:service}-${self:provider.stage}-bus
  frontendBucketName: ${self:service}-${self:provider.stage}-frontend
  pythonRequirements:
    usePoetry: false
    layer: false
    slim: true
    strip: false

package:
  individually: false
  patterns:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!tests/**"
    - "!.venv/**"
    - "!.pytest_cache/**"
    - "!.ruff_cache/**"
    - "!.coverage"
    - "!pyproject.toml"
    - "!node_modules/**"
    - "!package.json"
    - "!package-lock.json"
    - "!.serverless/**"

functions:
  authRegister:
    handler: handlers/auth/register.handler
    events:
      - httpApi:
          method: POST
          path: /auth/register

  authLogin:
    handler: handlers/auth/login.handler
    events:
      - httpApi:
          method: POST
          path: /auth/login

  usersMe:
    handler: handlers/users/me.handler
    events:
      - httpApi:
          method: GET
          path: /users/me
          authorizer:
            name: cognitoJwt

  dashboardStats:
    handler: handlers/dashboard/stats.handler
    events:
      - httpApi:
          method: GET
          path: /dashboard/stats
          authorizer:
            name: cognitoJwt

  integrationsWebhook:
    handler: handlers/integrations/webhook.handler
    events:
      - httpApi:
          method: POST
          path: /integrations/webhook

  integrationsDispatch:
    handler: handlers/integrations/dispatch.handler
    events:
      - httpApi:
          method: POST
          path: /integrations/dispatch
          authorizer:
            name: cognitoJwt

plugins:
  - serverless-python-requirements

resources:
  Resources:
    AppTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    AppEventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:custom.eventBusName}

    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:provider.stage}-pool
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: email
            AttributeDataType: String
            Required: true
            Mutable: true
          - Name: name
            AttributeDataType: String
            Required: false
            Mutable: true

    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:provider.stage}-client
        UserPoolId: !Ref UserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.frontendBucketName}
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    FrontendOriginAccessControl:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:custom.frontendBucketName}-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    FrontendDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          PriceClass: PriceClass_100
          HttpVersion: http2
          Origins:
            - Id: frontendS3
              DomainName: !GetAtt FrontendBucket.RegionalDomainName
              S3OriginConfig:
                OriginAccessIdentity: ""
              OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
          DefaultCacheBehavior:
            TargetOriginId: frontendS3
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub "${FrontendBucket.Arn}/*"
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  Outputs:
    HttpApiUrl:
      Description: Base URL of the HTTP API
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    UserPoolId:
      Value: !Ref UserPool
    UserPoolClientId:
      Value: !Ref UserPoolClient
    AppTableName:
      Value: !Ref AppTable
    EventBusName:
      Value: !Ref AppEventBus
    FrontendBucketName:
      Value: !Ref FrontendBucket
    FrontendDistributionId:
      Description: CloudFront distribution ID — used by CI to invalidate the cache after a frontend sync
      Value: !Ref FrontendDistribution
    FrontendDistributionDomain:
      Value: !GetAtt FrontendDistribution.DomainName
